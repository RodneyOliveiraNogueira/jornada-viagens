<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Jornada Viagens</title>
    <link rel="stylesheet" href="css/style.css" />
  </head>
  <body>
    <header>
      <a class="logo" href="index.html" title="Voltar para a página inicial">
        <img
          class="img-mobile"
          src="img/bussola-jornada-branca.png"
          alt="Bússola do log Jornada Viagens na cor branca"
        />
        <img
          class="img-desktop"
          src="img/bussola-jornada-branca+nome.png"
          alt="Logo Jornada Viagens na cor branca"
        />
      </a>

      <div class="nav-menu">
        <label for="menu">
          <img
            src="img/menu.png"
            alt="Menu de navegação do site Jornada Viagens"
        /></label>
        <input type="checkbox" id="menu" alt="menu-checkbox" hidden />

        <nav>
          <ul class="list-links">
            <li>
              <a href="Blog.html" target="_blank" title="Ir para o blog"
                >Blog</a
              >
            </li>
            <li>
              <a
                href="Pacotes.html"
                target="_blank"
                title="Ver pacotes de viagem"
                >Pacotes de Viagem</a
              >
            </li>
            <li>
              <a href="Contato.html" target="_blank" title="Entrar em contato"
                >Contato</a
              >
            </li>
          </ul>
        </nav>
      </div>
    </header>
    <section class="hero">
      <div class="hero-img"></div>
      <h2>
        Somos uma agência apaixonada por criar viagens inesquecíveis. Do destino
        à seleção das atividades, cuidamos de todos os detalhes para que você
        aproveite ao máximo cada momento da sua jornada!
      </h2>
    </section>
    <section class="offers">
      <div class="section-title">
        <h2>Ofertas da Semana</h2>
        <hr />
      </div>
    </section>
  </body>
</html>
